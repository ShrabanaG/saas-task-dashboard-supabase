<svg viewBox="0 0 480 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of an organized task board">
  <defs>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#14532d" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#14532d" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- soft backdrop -->
  <circle cx="240" cy="238" r="186" fill="#ffffff" opacity="0.45"/>
  <circle cx="392" cy="392" r="9" fill="#16a34a" opacity="0.35"/>
  <circle cx="70" cy="250" r="6" fill="#16a34a" opacity="0.3"/>
  <path d="M408 196 l5 0 M410.5 193.5 l0 5" stroke="#15803d" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M96 150 l5 0 M98.5 147.5 l0 5" stroke="#15803d" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- main board card -->
  <g filter="url(#softShadow)">
    <rect x="112" y="146" width="256" height="212" rx="18" fill="#ffffff"/>
  </g>
  <!-- board header -->
  <circle cx="132" cy="168" r="4" fill="#fca5a5"/>
  <circle cx="146" cy="168" r="4" fill="#fcd34d"/>
  <circle cx="160" cy="168" r="4" fill="#86efac"/>
  <rect x="250" y="163" width="100" height="9" rx="4.5" fill="#e2e8f0"/>
  <line x1="112" y1="186" x2="368" y2="186" stroke="#eef2f7" stroke-width="2"/>

  <!-- three kanban columns -->
  <!-- col 1: To Do -->
  <rect x="126" y="198" width="72" height="148" rx="10" fill="#f1f5f9"/>
  <rect x="134" y="206" width="36" height="8" rx="4" fill="#cbd5e1"/>
  <g filter="url(#cardShadow)"><rect x="134" y="222" width="56" height="38" rx="7" fill="#ffffff"/></g>
  <rect x="141" y="231" width="32" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="141" y="243" width="22" height="6" rx="3" fill="#eef2f7"/>
  <g filter="url(#cardShadow)"><rect x="134" y="268" width="56" height="38" rx="7" fill="#ffffff"/></g>
  <rect x="141" y="277" width="28" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="141" y="289" width="34" height="6" rx="3" fill="#eef2f7"/>

  <!-- col 2: Doing -->
  <rect x="206" y="198" width="72" height="148" rx="10" fill="#f1f5f9"/>
  <rect x="214" y="206" width="36" height="8" rx="4" fill="#fbbf24"/>
  <g filter="url(#cardShadow)"><rect x="214" y="222" width="56" height="48" rx="7" fill="#ffffff"/></g>
  <rect x="221" y="231" width="34" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="221" y="243" width="24" height="6" rx="3" fill="#eef2f7"/>
  <rect x="221" y="256" width="42" height="6" rx="3" fill="#fde68a"/>

  <!-- col 3: Done -->
  <rect x="286" y="198" width="72" height="148" rx="10" fill="#f1f5f9"/>
  <rect x="294" y="206" width="36" height="8" rx="4" fill="#34d399"/>
  <g filter="url(#cardShadow)"><rect x="294" y="222" width="56" height="38" rx="7" fill="#ffffff"/></g>
  <circle cx="305" cy="241" r="7" fill="#22c55e"/>
  <path d="M302 241 l2.2 2.4 l4-4.6" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="317" y="238" width="26" height="6" rx="3" fill="#e2e8f0"/>
  <g filter="url(#cardShadow)"><rect x="294" y="268" width="56" height="38" rx="7" fill="#ffffff"/></g>
  <circle cx="305" cy="287" r="7" fill="#22c55e"/>
  <path d="M302 287 l2.2 2.4 l4-4.6" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="317" y="284" width="22" height="6" rx="3" fill="#e2e8f0"/>

  <!-- floating mini card (top-left) -->
  <g transform="rotate(-7 118 116)" filter="url(#cardShadow)">
    <rect x="64" y="92" width="108" height="50" rx="12" fill="#ffffff"/>
    <circle cx="86" cy="117" r="11" fill="#dcfce7"/>
    <path d="M81 117 l3.4 3.6 l6-7" stroke="#16a34a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="104" y="108" width="52" height="7" rx="3.5" fill="#e2e8f0"/>
    <rect x="104" y="121" width="36" height="6" rx="3" fill="#eef2f7"/>
  </g>

  <!-- floating progress ring (top-right) -->
  <g filter="url(#cardShadow)">
    <circle cx="392" cy="120" r="34" fill="#ffffff"/>
  </g>
  <circle cx="392" cy="120" r="22" fill="none" stroke="#dcfce7" stroke-width="7"/>
  <circle cx="392" cy="120" r="22" fill="none" stroke="#16a34a" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="138.2" stroke-dashoffset="38" transform="rotate(-90 392 120)"/>
  <path d="M392 112 l0 16 M385 119 l7 -7 l7 7" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- little plant (bottom-left) -->
  <path d="M96 412 q-14 -34 4 -54 q10 14 -4 54Z" fill="#4ade80"/>
  <path d="M96 412 q14 -30 -2 -50 q-12 12 2 50Z" fill="#16a34a"/>
  <path d="M84 412 h28 l-4 18 h-20Z" fill="#15803d"/>
</svg>
